<style>
  :root{
    --brand:#F2701C;
    --brand-dark:#C85812;
    --brand-soft:rgba(242,113,28,0.12);
    --gold:#8A5A00;
    --gold-soft:rgba(184,134,11,0.16);
    --cream:#F6F1E7;
    --cream-alt:#ECE3D0;
    --ink:#2E2013;
    --ink-soft:#6B5A47;
    --line:#E3D9C7;
    --shadow:0 2px 10px rgba(46,32,19,0.08);
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream); color:var(--ink); min-height:100vh;
    font-family:'Gowun Dodum','Noto Sans KR',sans-serif; font-weight:700;
  }
  h1,h2,h3,h4{font-family:'Gowun Dodum','Noto Sans KR',sans-serif; margin:0; font-weight:700;}
  .wrap{max-width:640px; margin:0 auto; padding:0 18px 60px;}

  .hero{
    background:linear-gradient(160deg,var(--brand),var(--brand-dark));
    color:#FFF3E8; padding:40px 24px 46px; text-align:center; position:relative; overflow:hidden;
    border-radius:0 0 28px 28px; margin:0 -18px 28px;
  }
  .hero::after{content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 82% -10%, rgba(255,255,255,0.20), transparent 55%);}
  .hero .eyebrow{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,243,232,0.92); font-family:'Pretendard',sans-serif; font-weight:800; position:relative;}
  .hero h1{font-size:26px; color:#fff; margin-top:8px; position:relative;}
  .hero .sub{margin-top:10px; font-size:13.5px; color:rgba(255,243,232,0.94); font-family:'Noto Sans KR',sans-serif; font-weight:500; position:relative;}

  .card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); padding:26px 24px; margin-bottom:20px;
  }
  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:16px;}
  .field label{font-size:12.5px; color:var(--ink-soft); font-family:'Noto Sans KR',sans-serif; font-weight:700;}
  .field input{
    padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-size:15px;
    font-family:'Noto Sans KR',sans-serif; font-weight:500; background:var(--cream); color:var(--ink);
  }
  .field input:focus{outline:none; border-color:var(--brand);}
  .btn{
    width:100%; background:var(--brand); color:#fff; border:none; padding:13px 18px; border-radius:9px;
    font-size:15px; font-family:'Noto Sans KR',sans-serif; font-weight:700; cursor:pointer; transition:background .15s;
  }
  .btn:hover{background:var(--brand-dark);}
  .btn:disabled{opacity:.6; cursor:default;}
  .btn.ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line); margin-top:10px;}
  .error-msg{color:#B8391F; font-size:13px; font-family:'Noto Sans KR',sans-serif; font-weight:600; margin-top:4px; min-height:18px;}
  .login-note{font-size:12.5px; color:var(--ink-soft); font-family:'Noto Sans KR',sans-serif; font-weight:500; text-align:center; margin-top:6px; line-height:1.6;}

  .report-head{text-align:center; margin-bottom:22px; padding-bottom:16px; border-bottom:2px solid var(--brand-soft);}
  .report-head .academy{font-size:11px; letter-spacing:2px; color:var(--ink-soft); text-transform:uppercase; font-family:'Noto Sans KR',sans-serif;}
  .report-head h2{font-size:21px; margin-top:6px;}
  .report-head .meta{font-size:12.5px; color:var(--ink-soft); margin-top:8px; font-family:'Space Mono',monospace;}
  .report-section{margin-bottom:22px;}
  .report-section h4{font-size:14px; color:var(--brand-dark); margin-bottom:10px;}
  .report-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px 20px; font-size:13.5px; font-family:'Noto Sans KR',sans-serif; font-weight:500;}
  .report-grid .label{color:var(--ink-soft); font-size:11.5px; display:block; margin-bottom:2px;}
  .report-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
  .report-list li{background:var(--cream-alt); border-radius:8px; padding:9px 13px; font-size:13px; font-family:'Noto Sans KR',sans-serif; font-weight:500;}
  .report-list li.strong-item{background:var(--brand-soft); color:var(--brand-dark);}
  .report-list li.grow-item{background:var(--gold-soft); color:var(--gold);}
  .report-empty{color:var(--ink-soft); font-size:13px; font-family:'Noto Sans KR',sans-serif; font-weight:500;}
  .comment-box{
    border:1px dashed var(--line); border-radius:8px; padding:14px 16px; min-height:60px;
    font-family:'Gowun Dodum','Noto Sans KR',sans-serif; font-size:14px; background:var(--cream); color:var(--ink);
    white-space:pre-wrap; line-height:1.6;
  }
  .loading{text-align:center; padding:40px 0; color:var(--ink-soft); font-family:'Noto Sans KR',sans-serif; font-weight:500;}

  @media (max-width:480px){
    .report-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">FIND YOUR GREATNESS</div>
    <h1>아임수학학원</h1>
    <div class="sub">학부모·학생 전용 리포트 조회</div>
  </div>

  <div id="loginView">
    <div class="card">
      <form id="loginForm" onsubmit="login(event)">
        <div class="field">
          <label for="login-name">학생 이름</label>
          <input type="text" id="login-name" placeholder="예: 김민준" required>
        </div>
        <div class="field">
          <label for="login-pin">비밀번호(핸드폰끝뒷4자리)</label>
          <input type="password" id="login-pin" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="예: 1234" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">확인</button>
        <div class="error-msg" id="loginError"></div>
      </form>
      <div class="login-note">본인(자녀)의 이름과 비밀번호(학원에 등록된 연락처 끝 4자리)를 입력하시면<br>학습 리포트를 확인하실 수 있어요.</div>
    </div>
  </div>

  <div id="reportView" style="display:none;"></div>
</div>

<script>
/* ⚙️ 학원 선생님만: 구글 Apps Script 웹 앱 URL을 여기에 넣어주세요 (관리자 앱의 '데이터 관리'에서 쓰신 것과 동일한 주소예요) */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbztwkIqNYu0OiusfmsVIzZI6GXCujF3lGeYu3NRYr3EwyloixkygLsWmPj9j4B9e2YZ/exec';

let cachedData = null;

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function levelOf(grade){
  if(!grade) return '';
  return grade.startsWith('초') ? '초등부' : grade.startsWith('중') ? '중등부' : '';
}

async function fetchData(){
  if(cachedData) return cachedData;
  const res = await fetch(SHEET_URL, { method:'GET' });
  const data = await res.json();
  cachedData = data;
  return data;
}

async function login(e){
  e.preventDefault();
  const name = document.getElementById('login-name').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';

  if(!name || !pin){
    errEl.textContent = '이름과 비밀번호를 모두 입력해주세요.';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const data = await fetchData();
    const students = data.students || [];
    const student = students.find(s => s.name === name && s.pin === pin);

    if(!student){
      errEl.textContent = '일치하는 학생을 찾을 수 없어요. 이름과 비밀번호를 다시 확인해주시거나 학원에 문의해주세요.';
      btn.disabled = false;
      btn.textContent = '확인';
      return;
    }

    renderReport(data, student);
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('reportView').style.display = 'block';
  } catch(err){
    errEl.textContent = '데이터를 불러오지 못했어요. 인터넷 연결을 확인하시고 잠시 후 다시 시도해주세요.';
    btn.disabled = false;
    btn.textContent = '확인';
  }
}

function buildScoreChartSVG(tests){
  const w = 560, h = 200, padL = 38, padR = 18, padT = 18, padB = 34;
  const chartW = w - padL - padR, chartH = h - padT - padB;
  const n = tests.length;
  const xAt = i => n <= 1 ? padL + chartW / 2 : padL + (chartW * i / (n - 1));
  const yAt = score => padT + chartH - (score / 100 * chartH);

  const gridLines = [0, 50, 100].map(v => `
    <line x1="${padL}" y1="${yAt(v)}" x2="${w - padR}" y2="${yAt(v)}" stroke="var(--line)" stroke-width="1"/>
    <text x="${padL - 8}" y="${yAt(v) + 4}" font-size="10.5" text-anchor="end" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${v}</text>
  `).join('');

  const pathD = tests.map((t, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(t.score).toFixed(1)}`).join(' ');

  const points = tests.map((t, i) => `
    <circle cx="${xAt(i).toFixed(1)}" cy="${yAt(t.score).toFixed(1)}" r="4" fill="var(--brand)" stroke="#fff" stroke-width="2"/>
    <text x="${xAt(i).toFixed(1)}" y="${(yAt(t.score) - 10).toFixed(1)}" font-size="11" text-anchor="middle" fill="var(--ink)" font-family="'Space Mono',monospace" font-weight="700">${t.score}</text>
    <text x="${xAt(i).toFixed(1)}" y="${h - padB + 16}" font-size="10" text-anchor="middle" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${t.date.slice(5).replace('-', '/')}</text>
  `).join('');

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto;">
      ${gridLines}
      <path d="${pathD}" fill="none" stroke="var(--brand)" stroke-width="2.5"/>
      ${points}
    </svg>
  `;
}

function getUnitPerformanceData(studentId, data){
  const dailyTests = data.dailyTests || [];
  const mistakeRecords = data.mistakeRecords || [];
  const MISTAKE_WARNING_THRESHOLD = 3;

  const scoreAgg = {};
  dailyTests.filter(t => t.studentId === studentId).forEach(t => {
    if(!scoreAgg[t.unit]) scoreAgg[t.unit] = { sum: 0, count: 0 };
    scoreAgg[t.unit].sum += t.score;
    scoreAgg[t.unit].count++;
  });
  const avgScoreByUnit = {};
  Object.keys(scoreAgg).forEach(u => { avgScoreByUnit[u] = Math.round(scoreAgg[u].sum / scoreAgg[u].count); });

  const mistakeByUnit = {};
  mistakeRecords.filter(m => m.studentId === studentId).forEach(m => {
    mistakeByUnit[m.unit] = (mistakeByUnit[m.unit] || 0) + 1;
  });

  const allUnits = Array.from(new Set([...Object.keys(avgScoreByUnit), ...Object.keys(mistakeByUnit)]));

  function classify(u){
    const score = avgScoreByUnit[u];
    const mistakes = mistakeByUnit[u] || 0;
    if(score !== undefined && score >= 85 && mistakes < MISTAKE_WARNING_THRESHOLD) return 'strong';
    if((score !== undefined && score < 70) || mistakes >= MISTAKE_WARNING_THRESHOLD) return 'weak';
    return 'neutral';
  }

  return { avgScoreByUnit, mistakeByUnit, allUnits, classify };
}

function renderReport(data, student){
  const wrap = document.getElementById('reportView');
  const progressRows = [
    { label:'개념+유형', value: student.concept || '기록 없음' },
    { label:'쎈', value: student.sen || '기록 없음' }
  ];
  if(student.topS) progressRows.push({ label:'최상위S', value: student.topSProgress || '기록 없음' });

  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const monthPrefix = `${y}-${String(mo + 1).padStart(2,'0')}`;
  const attendanceRecords = (data.attendanceRecords || []).filter(r => r.studentId === student.id);
  const monthRecords = attendanceRecords.filter(r => r.date.startsWith(monthPrefix));
  const attCounts = { 출석:0, 지각:0, 결석:0, 조퇴:0 };
  monthRecords.forEach(r => { attCounts[r.status] = (attCounts[r.status] || 0) + 1; });

  const studentTests = (data.dailyTests || []).filter(t => t.studentId === student.id)
    .slice().sort((a,b) => a.date.localeCompare(b.date) || a.id - b.id);
  const avgScore = studentTests.length ? Math.round(studentTests.reduce((s,t) => s + t.score, 0) / studentTests.length) : null;

  const perf = getUnitPerformanceData(student.id, data);
  const strongUnits = perf.allUnits.filter(u => perf.classify(u) === 'strong');
  const weakUnits = perf.allUnits.filter(u => perf.classify(u) === 'weak');

  const studentMistakes = (data.mistakeRecords || []).filter(m => m.studentId === student.id);
  const causeCounts = {};
  studentMistakes.forEach(m => { causeCounts[m.cause] = (causeCounts[m.cause] || 0) + 1; });
  const topCauses = Object.entries(causeCounts).sort((a,b) => b[1] - a[1]).slice(0, 5);

  const teacherComments = data.teacherComments || {};
  const comment = teacherComments[student.id] || teacherComments[String(student.id)] || '';

  const todayStr = `${y}.${String(mo + 1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  wrap.innerHTML = `
    <div class="card">
      <div class="report-head">
        <div class="academy">${escapeHtml(data.academyName || '아임수학학원')}</div>
        <h2>${escapeHtml(student.name)} 학생 학습 리포트</h2>
        <div class="meta">${escapeHtml(student.grade)} · ${escapeHtml(student.school) || '학교 정보 없음'}${student.topS ? ' · ⭐ 최상위S' : ''} · 조회일 ${todayStr}</div>
      </div>

      <div class="report-section">
        <h4>📘 진도 현황</h4>
        <div class="report-grid">
          ${progressRows.map(r => `<div><span class="label">${r.label}</span>${escapeHtml(r.value)}</div>`).join('')}
        </div>
      </div>

      <div class="report-section">
        <h4>🗓️ 이번 달 출결 현황</h4>
        ${monthRecords.length === 0 ? `<div class="report-empty">이번 달 출결 기록이 아직 없어요.</div>` : `
          <div class="report-grid">
            <div><span class="label">출석</span>${attCounts.출석}일</div>
            <div><span class="label">지각</span>${attCounts.지각}일</div>
            <div><span class="label">결석</span>${attCounts.결석}일</div>
            <div><span class="label">조퇴</span>${attCounts.조퇴}일</div>
          </div>`}
      </div>

      <div class="report-section">
        <h4>✏️ 데일리 테스트${avgScore !== null ? ` · 평균 ${avgScore}점` : ''}</h4>
        ${studentTests.length === 0 ? `<div class="report-empty">기록된 데일리 테스트가 없어요.</div>` : buildScoreChartSVG(studentTests)}
      </div>

      <div class="report-section">
        <h4>💪 강점 단원</h4>
        ${strongUnits.length === 0
          ? `<div class="report-empty">아직 강점으로 뽑을 만큼 데이터가 쌓이지 않았어요.</div>`
          : `<ul class="report-list">${strongUnits.map(u => `<li class="strong-item">${escapeHtml(u)}</li>`).join('')}</ul>`}
      </div>

      <div class="report-section">
        <h4>🌱 보완하면 좋은 부분</h4>
        ${weakUnits.length === 0
          ? `<div class="report-empty">지금까지는 특별히 보완이 필요한 단원이 없어요.</div>`
          : `<ul class="report-list">${weakUnits.map(u => `<li class="grow-item">${escapeHtml(u)} · 조금 더 연습하면 훨씬 좋아질 부분이에요</li>`).join('')}</ul>`}
      </div>

      <div class="report-section">
        <h4>🔎 자주 보이는 실수 유형</h4>
        ${topCauses.length === 0
          ? `<div class="report-empty">기록된 오답 원인이 없어요.</div>`
          : `<ul class="report-list">${topCauses.map(([cause, cnt]) => `<li>${escapeHtml(cause)} <span style="color:var(--ink-soft); font-size:12px;">· ${cnt}회</span></li>`).join('')}</ul>`}
      </div>

      <div class="report-section" style="margin-bottom:0;">
        <h4>💬 선생님 한마디</h4>
        <div class="comment-box">${comment ? escapeHtml(comment) : '아직 남겨주신 코멘트가 없어요.'}</div>
      </div>
    </div>

    <button type="button" class="btn ghost" onclick="location.reload()">🔒 로그아웃 (다른 학생 조회)</button>
  `;
}
</script>
</body>
</html>
