<style>
  :root{
    --brand:#F2701C; --brand-dark:#C85812; --brand-soft:rgba(242,113,28,0.12);
    --gold:#8A5A00; --gold-soft:rgba(184,134,11,0.16);
    --cream:#F6F1E7; --cream-alt:#EFE7D6;
    --ink:#2B2118; --ink-soft:#6B5A47;
    --line:#DCCFB6; --line-strong:#C9B896;
    --shadow:0 1px 3px rgba(43,33,24,0.07);
    --radius:6px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream); color:var(--ink); min-height:100vh;
    font-family:'Noto Sans KR',sans-serif; font-weight:500;
  }
  h1,h2,h3,h4{font-family:'Noto Serif KR',serif; margin:0; font-weight:700;}
  .wrap{max-width:500px; margin:0 auto; padding:32px 18px 60px;}

  /* 레터헤드 (로그인 + 리포트 공용) */
  .letterhead{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:30px 26px 24px; text-align:center; box-shadow:var(--shadow);
  }
  .seal{
    width:54px; height:54px; border-radius:50%; border:2px solid var(--brand);
    display:flex; align-items:center; justify-content:center; margin:0 auto 13px;
    font-family:'Gowun Dodum',sans-serif; font-size:17px; color:var(--brand-dark); position:relative;
  }
  .seal::after{ content:''; position:absolute; inset:5px; border:1px solid var(--brand); border-radius:50%; opacity:.45; }
  .eyebrow{
    font-size:10.5px; letter-spacing:3px; color:var(--ink-soft); text-transform:uppercase;
    font-weight:700; margin-bottom:6px;
  }
  .academy-name{ font-size:22px; margin-bottom:4px; }
  .login-sub{ font-size:12.5px; color:var(--ink-soft); font-weight:500; margin-bottom:22px; }

  .student-row{ display:flex; justify-content:space-between; align-items:baseline; margin-top:14px; text-align:left; }
  .student-name{ font-size:17px; }
  .student-meta{ font-size:12px; color:var(--ink-soft); font-weight:500; margin-top:2px; }
  .issue-date{ font-family:'Space Mono',monospace; font-size:10.5px; color:var(--ink-soft); text-align:right; line-height:1.5; flex-shrink:0; }

  /* 폼 요소 */
  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:16px; text-align:left; }
  .field label{ font-size:12.5px; color:var(--ink-soft); font-weight:700; }
  .field input{
    padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-size:15px;
    font-family:'Noto Sans KR',sans-serif; font-weight:500; background:var(--cream); color:var(--ink);
  }
  .field input:focus{ outline:none; border-color:var(--brand); }
  .btn{
    width:100%; background:var(--brand); color:#fff; border:none; padding:13px 18px; border-radius:8px;
    font-size:14.5px; font-family:'Noto Sans KR',sans-serif; font-weight:700; cursor:pointer; transition:background .15s;
  }
  .btn:hover{ background:var(--brand-dark); }
  .btn:disabled{ opacity:.6; cursor:default; }
  .btn.ghost{ background:transparent; color:var(--ink-soft); border:1px solid var(--line); margin-top:14px; }
  .error-msg{ color:#B8391F; font-size:13px; font-weight:600; margin-top:4px; min-height:18px; }
  .login-note{ font-size:12px; color:var(--ink-soft); text-align:center; margin-top:16px; line-height:1.65; }

  /* 형제자매 탭 */
  .sibling-tabs{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin:14px 0 0; }
  .sibling-tab{
    padding:6px 15px; border-radius:20px; border:1px solid var(--line); background:#fff;
    font-size:12.5px; font-weight:700; color:var(--ink-soft); cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  }
  .sibling-tab.active{ background:var(--ink); border-color:var(--ink); color:#fff; }

  /* 알림 공지 */
  .notice-strip{
    background:#fff; border:1px solid var(--line); border-left:3px solid var(--brand);
    border-radius:var(--radius); padding:13px 15px; margin:16px 0; box-shadow:var(--shadow);
  }
  .notice-head{
    display:flex; align-items:center; gap:7px; font-size:11px; font-weight:700;
    color:var(--brand-dark); letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px;
  }
  .notice-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:7px 0; border-top:1px dashed var(--line); cursor:pointer;
  }
  .notice-row:first-child{ border-top:none; padding-top:0; }
  .notice-row-text{ font-size:12.5px; font-weight:600; color:var(--ink); }
  .notice-row-go{ font-size:11px; color:var(--ink-soft); font-weight:700; white-space:nowrap; flex-shrink:0; }
  .notice-row:hover .notice-row-go{ color:var(--brand-dark); }

  /* 요약 링 */
  .summary-strip{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    display:flex; margin:0 0 18px; box-shadow:var(--shadow); padding:18px 6px 16px;
  }
  .ring-item{ flex:1; text-align:center; position:relative; }
  .ring-item + .ring-item::before{
    content:''; position:absolute; left:0; top:12%; bottom:12%; width:1px; background:var(--line);
  }
  .ring-label{ font-size:10.5px; color:var(--ink-soft); font-weight:700; margin-bottom:8px; }
  .ring-wrap{ position:relative; width:58px; height:58px; margin:0 auto; }
  .ring-num{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-weight:700; font-size:12px; color:var(--ink);
  }

  /* 탭 */
  .tabs{ display:flex; border-bottom:1px solid var(--line-strong); margin-bottom:18px; overflow-x:auto; }
  .tab{
    flex:1; text-align:center; padding:11px 4px; font-size:12.5px; font-weight:700; color:var(--ink-soft);
    cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s, border-color .15s;
    background:none; border-top:none; border-left:none; border-right:none; font-family:'Noto Sans KR',sans-serif;
    white-space:nowrap;
  }
  .tab.active{ color:var(--brand-dark); border-bottom-color:var(--brand); }

  .tab-panel{ display:none; }
  .tab-panel.active{ display:block; animation:fadeIn .2s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(2px);} to{opacity:1; transform:translateY(0);} }
  .flash-highlight{ animation: flashHighlight 1.1s ease; }
  @keyframes flashHighlight{
    0%{ box-shadow:0 0 0 3px var(--brand-soft); border-color:var(--brand); }
    100%{ box-shadow:var(--shadow); border-color:var(--line); }
  }

  .section-card{
    background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 20px 18px; margin-bottom:14px;
  }
  .section-title{
    font-size:14.5px; font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:8px; color:var(--ink);
  }
  .section-title .num{
    font-family:'Space Mono',monospace; font-size:11px; color:var(--brand); border:1px solid var(--brand);
    border-radius:50%; width:18px; height:18px; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center;
  }
  .row{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px dashed var(--line); font-size:13px; gap:10px; }
  .row:last-child{ border-bottom:none; }
  .row .label{ color:var(--ink-soft); flex-shrink:0; }
  .row .val{ font-weight:700; font-family:'Space Mono',monospace; text-align:right; }

  .report-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .report-list li{ background:var(--cream-alt); border-radius:8px; padding:9px 13px; font-size:13px; font-weight:500; }
  .report-list li.strong-item{ background:var(--brand-soft); color:var(--brand-dark); }
  .report-list li.grow-item{ background:var(--gold-soft); color:var(--gold); }
  .report-empty{ color:var(--ink-soft); font-size:13px; font-weight:500; }

  .highlight-box{
    background:var(--cream-alt); border-left:3px solid var(--brand); border-radius:0 8px 8px 0;
    padding:14px 16px; font-size:13.5px; line-height:1.7; color:var(--ink); white-space:pre-wrap;
  }

  .footer-mark{
    text-align:center; margin:22px 0 18px; font-size:10px; color:var(--ink-soft);
    font-family:'Space Mono',monospace; letter-spacing:.5px;
  }

  /* 메시지 */
  .msg-textarea{
    width:100%; border:1px solid var(--line); border-radius:8px; padding:10px 12px; box-sizing:border-box;
    font-family:'Noto Sans KR',sans-serif; font-size:13.5px; min-height:70px; resize:vertical;
    background:var(--cream); color:var(--ink);
  }
  .msg-status{ font-size:12px; color:var(--ink-soft); margin-top:6px; font-weight:500; min-height:16px; }
  .msg-history-item{ background:var(--cream-alt); border-radius:8px; padding:9px 12px; font-size:12.5px; font-weight:500; color:var(--ink); margin-bottom:8px; }
  .msg-history-date{ font-size:10.5px; color:var(--ink-soft); font-family:'Space Mono',monospace; display:block; margin-bottom:3px; }

  /* 자가채점 / 탭그리드 */
  .tap-grid{ display:flex; flex-wrap:wrap; gap:6px; }
  .tap-num-btn{
    width:36px; height:36px; border-radius:8px; border:1px solid var(--line); background:#fff;
    color:var(--ink-soft); font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
    transition:background .15s, border-color .15s, color .15s;
  }
  .tap-num-btn:hover{ border-color:var(--brand); }
  .tap-num-btn.wrong{ background:#B8391F; border-color:#B8391F; color:#fff; }
  .hw-self-input{
    width:100%; box-sizing:border-box; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
    font-family:'Noto Sans KR',sans-serif; font-size:13.5px; background:var(--cream); color:var(--ink); margin-bottom:8px;
  }
  .ak-input-row{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .ak-input-row .ak-num{ width:32px; font-weight:700; font-family:'Space Mono',monospace; font-size:13px; color:var(--ink-soft); flex-shrink:0; }
  .ak-input-row input{ flex:1; margin-bottom:0; }
  .progress-pill{ display:inline-block; background:var(--cream-alt); border-radius:20px; padding:6px 14px; font-size:12.5px; font-weight:700; color:var(--ink-soft); }

  .loading{ text-align:center; padding:40px 0; color:var(--ink-soft); font-weight:500; }

  @media (max-width:480px){
    .wrap{ padding:24px 14px 50px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div id="loginView">
    <div class="letterhead">
      <div class="seal">아임</div>
      <div class="eyebrow">Student Portal Login</div>
      <div class="academy-name">아임수학학원</div>
      <div class="login-sub">학부모·학생 전용 학습 리포트</div>
      <form id="loginForm" onsubmit="login(event)">
        <div class="field">
          <label for="login-name">학생 이름</label>
          <input type="text" id="login-name" placeholder="예: 김민준" required>
        </div>
        <div class="field">
          <label for="login-pin">비밀번호(핸드폰끝뒷4자리)</label>
          <input type="password" id="login-pin" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="예: 1234" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">확인</button>
        <div class="error-msg" id="loginError"></div>
      </form>
      <div class="login-note">본인(자녀)의 이름과 비밀번호(학원에 등록된 연락처 끝 4자리)를 입력하시면<br>학습 리포트를 확인하실 수 있어요.</div>
    </div>
  </div>

  <div id="reportView" style="display:none;"></div>
</div>

<script>
/* ⚙️ 학원 선생님만: 구글 Apps Script 웹 앱 URL을 여기에 넣어주세요 (관리자 앱의 '데이터 관리'에서 쓰신 것과 동일한 주소예요) */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycby248HXB7pvkzJ1gBjmLux0myAH2otNNt2A4Vp0edu0HAW49W42-8-uJzN_aKnbP6Uf/exec';

let cachedData = null;
let currentData = null;
let siblingList = [];
let currentStudentId = null;

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function levelOf(grade){
  if(!grade) return '';
  return grade.startsWith('초') ? '초등부' : grade.startsWith('중') ? '중등부' : '';
}

async function fetchData(){
  if(cachedData) return cachedData;
  const res = await fetch(SHEET_URL, { method:'GET' });
  const data = await res.json();
  cachedData = data;
  return data;
}

async function login(e){
  e.preventDefault();
  const name = document.getElementById('login-name').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';

  if(!name || !pin){
    errEl.textContent = '이름과 비밀번호를 모두 입력해주세요.';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const data = await fetchData();
    const students = data.students || [];
    const student = students.find(s => s.name === name && s.pin === pin);

    if(!student){
      errEl.textContent = '일치하는 학생을 찾을 수 없어요. 이름과 비밀번호를 다시 확인해주시거나 학원에 문의해주세요.';
      btn.disabled = false;
      btn.textContent = '확인';
      return;
    }

    currentData = data;
    // 가족 연결 코드가 명시적으로 설정된 학생끼리만 형제자매로 묶어요.
    // (예전에는 비밀번호가 같으면 형제자매로 취급했는데, 서로 다른 가족이 우연히
    //  같은 비밀번호를 쓰면 다른 학생 정보가 보이는 문제가 있어서 수정했어요.)
    siblingList = student.familyCode
      ? students.filter(s => s.familyCode && s.familyCode === student.familyCode)
      : [student];
    showStudentReport(student.id);
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('reportView').style.display = 'block';
  } catch(err){
    errEl.textContent = '데이터를 불러오지 못했어요. 인터넷 연결을 확인하시고 잠시 후 다시 시도해주세요.';
    btn.disabled = false;
    btn.textContent = '확인';
  }
}

function showStudentReport(studentId){
  currentStudentId = studentId;
  const student = (currentData.students || []).find(s => s.id === studentId);
  if(!student) return;

function switchReportTab(tabName){
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById('tabpanel-' + tabName);
  if(panel){
    panel.classList.add('active');
    const firstCard = panel.querySelector ? panel.querySelector('.section-card') : null;
    if(firstCard){
      firstCard.classList.remove('flash-highlight');
      void firstCard.offsetWidth;
      firstCard.classList.add('flash-highlight');
    }
  }
  const btn = document.querySelector(`.tab[data-tab="${tabName}"]`);
  if(btn) btn.classList.add('active');
  const tabsBar = document.getElementById('reportTabs');
  if(tabsBar) tabsBar.scrollIntoView({ behavior:'smooth', block:'start' });
}

function ringSVG(percent, color, size, stroke){
  size = size || 58; stroke = stroke || 5;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = percent === null || percent === undefined ? 0 : Math.max(0, Math.min(100, percent));
  const offset = c * (1 - pct / 100);
  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EFE7D6" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}" transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>`;
}

function buildScoreChartSVG(tests, groupAvg){
  const w = 560, h = 200, padL = 38, padR = 18, padT = 18, padB = 34;
  const chartW = w - padL - padR, chartH = h - padT - padB;
  const n = tests.length;
  const xAt = i => n <= 1 ? padL + chartW / 2 : padL + (chartW * i / (n - 1));
  const yAt = score => padT + chartH - (score / 100 * chartH);

  const gridLines = [0, 50, 100].map(v => `
    <line x1="${padL}" y1="${yAt(v)}" x2="${w - padR}" y2="${yAt(v)}" stroke="var(--line)" stroke-width="1"/>
    <text x="${padL - 8}" y="${yAt(v) + 4}" font-size="10.5" text-anchor="end" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${v}</text>
  `).join('');

  const pathD = tests.map((t, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(t.score).toFixed(1)}`).join(' ');

  const points = tests.map((t, i) => `
    <circle cx="${xAt(i).toFixed(1)}" cy="${yAt(t.score).toFixed(1)}" r="4" fill="var(--brand)" stroke="#fff" stroke-width="2"/>
    <text x="${xAt(i).toFixed(1)}" y="${(yAt(t.score) - 10).toFixed(1)}" font-size="11" text-anchor="middle" fill="var(--ink)" font-family="'Space Mono',monospace" font-weight="700">${t.score}</text>
    <text x="${xAt(i).toFixed(1)}" y="${h - padB + 16}" font-size="10" text-anchor="middle" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${t.date.slice(5).replace('-', '/')}</text>
  `).join('');

  const groupLineHtml = (groupAvg !== undefined && groupAvg !== null) ? `
    <line x1="${padL}" y1="${yAt(groupAvg).toFixed(1)}" x2="${w - padR}" y2="${yAt(groupAvg).toFixed(1)}" stroke="var(--gold)" stroke-width="1.8" stroke-dasharray="6,4"/>
    <text x="${w - padR}" y="${(yAt(groupAvg) - 6).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--gold)" font-family="'Noto Sans KR',sans-serif" font-weight="700">그룹 평균 ${groupAvg}점</text>
  ` : '';

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto;">
      ${gridLines}
      ${groupLineHtml}
      <path d="${pathD}" fill="none" stroke="var(--brand)" stroke-width="2.5"/>
      ${points}
    </svg>
  `;
}

function computeGroupAvgScore(studentId, data){
  const students = data.students || [];
  const student = students.find(s => s.id === studentId);
  if(!student) return null;
  const level = levelOf(student.grade);
  const groupTests = (data.dailyTests || []).filter(t => {
    const s = students.find(x => x.id === t.studentId);
    return s && levelOf(s.grade) === level;
  });
  if(groupTests.length === 0) return null;
  return Math.round(groupTests.reduce((sum, t) => sum + t.score, 0) / groupTests.length);
}

function getUnitPerformanceData(studentId, data){
  const dailyTests = data.dailyTests || [];
  const mistakeRecords = data.mistakeRecords || [];
  const MISTAKE_WARNING_THRESHOLD = 3;

  const scoreAgg = {};
  dailyTests.filter(t => t.studentId === studentId).forEach(t => {
    if(!scoreAgg[t.unit]) scoreAgg[t.unit] = { sum: 0, count: 0 };
    scoreAgg[t.unit].sum += t.score;
    scoreAgg[t.unit].count++;
  });
  const avgScoreByUnit = {};
  Object.keys(scoreAgg).forEach(u => { avgScoreByUnit[u] = Math.round(scoreAgg[u].sum / scoreAgg[u].count); });

  const mistakeByUnit = {};
  mistakeRecords.filter(m => m.studentId === studentId).forEach(m => {
    mistakeByUnit[m.unit] = (mistakeByUnit[m.unit] || 0) + 1;
  });

  const allUnits = Array.from(new Set([...Object.keys(avgScoreByUnit), ...Object.keys(mistakeByUnit)]));

  function classify(u){
    const score = avgScoreByUnit[u];
    const mistakes = mistakeByUnit[u] || 0;
    if(score !== undefined && score >= 85 && mistakes < MISTAKE_WARNING_THRESHOLD) return 'strong';
    if((score !== undefined && score < 70) || mistakes >= MISTAKE_WARNING_THRESHOLD) return 'weak';
    return 'neutral';
  }

  return { avgScoreByUnit, mistakeByUnit, allUnits, classify };
}

        <input type="text" id="hwSelfRangeManual" class="hw-self-input" placeholder="숙제 범위 직접 입력 (예: 라이트 62p~68p)" style="display:none;" oninput="onHwSelfManualRangeInput()">
        <div id="hwSelfModeArea">
          <div class="report-empty" style="margin-top:4px;">먼저 위에서 숙제 범위를 선택해주세요.</div>
        </div>
        <div><button type="button" class="btn" style="margin-top:12px;" onclick="submitSelfHomework(${student.id})">제출하기</button></div>
        <div class="msg-status" id="hwSelfStatus"></div>
      </div>

      <div class="section-card">
        <div class="section-title"><span class="num">3</span>숙제 채점 결과</div>
        ${studentHomework.length === 0
          ? `<div class="report-empty">기록된 숙제가 없어요.</div>`
          : `<ul class="report-list">${studentHomework.map(h => {
              const wrongText = (h.wrongNumbers && h.wrongNumbers.length) ? `틀림: ${h.wrongNumbers.join(', ')}번` : '틀린 문제 없음';
              return `<li>${h.date.replace(/-/g,'.')} · ${escapeHtml(h.range)} · <strong>${h.score}점</strong> <span style="color:var(--ink-soft); font-size:12px;">(${wrongText})</span></li>`;
            }).join('')}</ul>`}
      </div>
    </div>

    <div id="tabpanel-analysis" class="tab-panel">
      <div class="section-card">
        <div class="section-title"><span class="num">1</span>강점 단원</div>
        ${strongUnits.length === 0
          ? `<div class="report-empty">아직 강점으로 뽑을 만큼 데이터가 쌓이지 않았어요.</div>`
          : `<ul class="report-list">${strongUnits.map(u => `<li class="strong-item">${escapeHtml(u)}</li>`).join('')}</ul>`}
      </div>
      <div class="section-card">
        <div class="section-title"><span class="num">2</span>보완하면 좋은 부분</div>
        ${weakUnits.length === 0
          ? `<div class="report-empty">지금까지는 특별히 보완이 필요한 단원이 없어요.</div>`
          : `<ul class="report-list">${weakUnits.map(u => `<li class="grow-item">${escapeHtml(u)} · 조금 더 연습하면 훨씬 좋아질 부분이에요</li>`).join('')}</ul>`}
      </div>
      <div class="section-card">
        <div class="section-title"><span class="num">3</span>자주 보이는 실수 유형</div>
        ${topCauses.length === 0
          ? `<div class="report-empty">기록된 오답 원인이 없어요.</div>`
          : `<ul class="report-list">${topCauses.map(([cause, cnt]) => `<li>${escapeHtml(cause)} <span style="color:var(--ink-soft); font-size:12px;">· ${cnt}회</span></li>`).join('')}</ul>`}
      </div>
      <div class="section-card">
        <div class="section-title"><span class="num">4</span>최근 오답 상세</div>
        ${recentMistakes.length === 0
          ? `<div class="report-empty">기록된 오답이 없어요.</div>`
          : `<ul class="report-list">${recentMistakes.map(m => `<li>${m.date.replace(/-/g,'.')} · ${escapeHtml(m.unit)} · ${escapeHtml(m.cause)}${m.note ? ` <span style="color:var(--ink-soft); font-size:12px;">(${escapeHtml(m.note)})</span>` : ''}</li>`).join('')}</ul>`}
      </div>
    </div>

    <div id="tabpanel-msg" class="tab-panel">
      <div class="section-card">
        <div class="section-title"><span class="num">1</span>선생님께 메시지 남기기</div>
        ${parentMessages.length > 0 ? `
          <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">
            ${parentMessages.map(m => `
              <div class="msg-history-item">
                <span class="msg-history-date">${new Date(m.date).toLocaleString('ko-KR')}</span>
                ${escapeHtml(m.message)}
              </div>`).join('')}
          </div>` : ''}
        <textarea id="parentMsgInput" class="msg-textarea" placeholder="선생님께 궁금한 점이나 전하고 싶은 말을 남겨주세요."></textarea>
        <button type="button" class="btn" style="margin-top:10px;" onclick="submitParentMessage(${student.id})">메시지 보내기</button>
        <div class="msg-status" id="parentMsgStatus"></div>
      </div>
    </div>

    <div class="footer-mark">IMM MATH ACADEMY · REPORT NO. ${y}${String(mo+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}-${String(student.id).padStart(3,'0')}</div>
    <button type="button" class="btn ghost" onclick="location.reload()">🔒 로그아웃 (다른 학생 조회)</button>
  `;
}

async function toggleHomeworkCheck(assignmentId, studentId, checked){
  const statusEl = document.getElementById('hwChecklistStatus');
  if(statusEl) statusEl.textContent = '저장 중...';

  try {
    const freshRes = await fetch(SHEET_URL, { method:'GET' });
    const freshData = await freshRes.json();

    freshData.homeworkAssignments = freshData.homeworkAssignments || [];
    const a = freshData.homeworkAssignments.find(x => x.id === assignmentId);
    if(a){
      a.doneBy = a.doneBy || [];
      const idx = a.doneBy.indexOf(studentId);
      if(checked && idx === -1) a.doneBy.push(studentId);
      if(!checked && idx !== -1) a.doneBy.splice(idx, 1);
    }

    await fetch(SHEET_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain' },
      body: JSON.stringify(freshData)
    });

    cachedData = freshData;
    currentData = freshData;
    showStudentReport(studentId);
  } catch(err){
    if(statusEl) statusEl.textContent = '❌ 저장에 실패했어요. 잠시 후 다시 시도해주세요.';
  }
}

/* =========================================================
   숙제 스스로 채점하기 (자가채점)
========================================================= */
let hwSelfWrongSet = new Set();
let hwSelfMatchedKey = null;

function tapModeHtml(){
  return `
    <input type="number" id="hwSelfTotal" class="hw-self-input" min="1" placeholder="전체 문항 수" oninput="renderHwSelfGrid()">
    <div class="sub" style="margin:6px 0 8px; font-size:12px; color:var(--ink-soft);">틀린 문항 번호를 탭해주세요 (탭하면 빨갛게 표시)</div>
    <div class="tap-grid" id="hwSelfGrid"></div>
    <div class="progress-pill" id="hwSelfPreview" style="margin-top:12px; display:inline-block;">전체 문항 수를 먼저 입력해주세요.</div>
  `;
}

function onHwSelfManualRangeInput(){
  hwSelfMatchedKey = null;
  const areaEl = document.getElementById('hwSelfModeArea');
  areaEl.innerHTML = tapModeHtml();
}

function checkHwSelfAnswerKey(){
  const sel = document.getElementById('hwSelfRange');
  const manualInput = document.getElementById('hwSelfRangeManual');
  const areaEl = document.getElementById('hwSelfModeArea');
  const value = sel.value;

  if(value === '__manual__'){
    manualInput.style.display = 'block';
    manualInput.value = '';
    manualInput.focus();
    hwSelfMatchedKey = null;
    areaEl.innerHTML = tapModeHtml();
    return;
  }
  manualInput.style.display = 'none';

  if(!value){
    hwSelfMatchedKey = null;
    areaEl.innerHTML = `<div class="report-empty" style="margin-top:4px;">먼저 위에서 숙제 범위를 선택해주세요.</div>`;
    return;
  }

  const keys = (currentData && currentData.answerKeys) || [];
  const match = keys.find(k => k.range === value);

  if(match){
    hwSelfMatchedKey = match;
    areaEl.innerHTML = `
      <p style="font-size:12px; color:var(--brand-dark); font-weight:700; margin:10px 0 8px;">✅ 이 범위는 자동채점이 가능해요! 네가 쓴 답을 번호별로 입력해봐.</p>
      ${Array.from({ length: match.total }, (_, i) => i + 1).map(n => `
        <div class="ak-input-row">
          <span class="ak-num">${n}번</span>
          <input type="text" id="hwSelfAnswer-${n}" class="hw-self-input" style="margin-bottom:0;" placeholder="네가 쓴 답">
        </div>
      `).join('')}
    `;
  } else {
    hwSelfMatchedKey = null;
    areaEl.innerHTML = tapModeHtml();
  }
}

function renderHwSelfGrid(){
  const total = Number(document.getElementById('hwSelfTotal').value);
  const gridEl = document.getElementById('hwSelfGrid');
  hwSelfWrongSet.clear();
  if(!total || total < 1){
    gridEl.innerHTML = '';
    updateHwSelfPreview(0, 0);
    return;
  }
  let html = '';
  for(let i = 1; i <= total; i++){
    html += `<button type="button" class="tap-num-btn" data-num="${i}" onclick="toggleHwSelfWrongNum(${i})">${i}</button>`;
  }
  gridEl.innerHTML = html;
  updateHwSelfPreview(total, 0);
}

function toggleHwSelfWrongNum(num){
  if(hwSelfWrongSet.has(num)) hwSelfWrongSet.delete(num); else hwSelfWrongSet.add(num);
  const btn = document.querySelector(`#hwSelfGrid .tap-num-btn[data-num="${num}"]`);
  if(btn) btn.classList.toggle('wrong', hwSelfWrongSet.has(num));
  const total = Number(document.getElementById('hwSelfTotal').value);
  updateHwSelfPreview(total, hwSelfWrongSet.size);
}

function updateHwSelfPreview(total, wrongCount){
  const el = document.getElementById('hwSelfPreview');
  if(!total){ el.textContent = '전체 문항 수를 먼저 입력해주세요.'; return; }
  const score = Math.round(((total - wrongCount) / total) * 100);
  el.textContent = `틀린 ${wrongCount}개 · 예상 점수 ${score}점`;
}

async function submitSelfHomework(studentId){
  const date = document.getElementById('hwSelfDate').value;
  const rangeSelectEl = document.getElementById('hwSelfRange');
  const manualInputEl = document.getElementById('hwSelfRangeManual');
  const range = rangeSelectEl.value === '__manual__' ? manualInputEl.value.trim() : rangeSelectEl.value;
  const statusEl = document.getElementById('hwSelfStatus');

  if(!date || !range){
    statusEl.textContent = '날짜와 숙제 범위를 입력해주세요.';
    return;
  }

  let total, correct, wrongNumbers, score;

  if(hwSelfMatchedKey && hwSelfMatchedKey.range === range){
    total = hwSelfMatchedKey.total;
    const wrong = [];
    for(let i = 1; i <= total; i++){
      const inputEl = document.getElementById(`hwSelfAnswer-${i}`);
      const myAnswer = inputEl ? inputEl.value.trim() : '';
      const correctAnswer = String(hwSelfMatchedKey.answers[i] || '').trim();
      if(!myAnswer || myAnswer !== correctAnswer){
        wrong.push(i);
      }
    }
    wrongNumbers = wrong;
    correct = total - wrong.length;
    score = Math.round((correct / total) * 100);
  } else {
    total = Number(document.getElementById('hwSelfTotal').value);
    if(!total){
      statusEl.textContent = '전체 문항 수를 입력해주세요.';
      return;
    }
    wrongNumbers = Array.from(hwSelfWrongSet).sort((a,b) => a - b);
    correct = total - wrongNumbers.length;
    score = Math.round((correct / total) * 100);
  }

  statusEl.textContent = '제출 중...';

  try {
    const freshRes = await fetch(SHEET_URL, { method:'GET' });
    const freshData = await freshRes.json();

    freshData.homeworkRecords = freshData.homeworkRecords || [];
    const nextId = freshData.homeworkRecords.length ? Math.max(...freshData.homeworkRecords.map(h => h.id || 0)) + 1 : 1;
    freshData.homeworkRecords.push({ id: nextId, studentId, date, range, total, correct, wrongNumbers, score });

    await fetch(SHEET_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain' },
      body: JSON.stringify(freshData)
    });

    cachedData = freshData;
    currentData = freshData;
    statusEl.textContent = `✅ 제출 완료! (${score}점)`;
    showStudentReport(studentId);
  } catch(err){
    statusEl.textContent = '❌ 제출에 실패했어요. 잠시 후 다시 시도해주세요.';
  }
}

async function submitParentMessage(studentId){
  const textEl = document.getElementById('parentMsgInput');
  const statusEl = document.getElementById('parentMsgStatus');
  const text = textEl.value.trim();

  if(!text){
    statusEl.textContent = '메시지를 입력해주세요.';
    return;
  }

  statusEl.textContent = '전송 중...';

  try {
    const freshRes = await fetch(SHEET_URL, { method:'GET' });
    const freshData = await freshRes.json();

    const student = (freshData.students || []).find(s => s.id === studentId);

    freshData.parentMessages = freshData.parentMessages || [];
    freshData.parentMessages.push({
      studentId: studentId,
      studentName: student ? student.name : '',
      message: text,
      date: new Date().toISOString(),
      from: 'parent'
    });

    await fetch(SHEET_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain' },
      body: JSON.stringify(freshData)
    });

    cachedData = freshData;
    currentData = freshData;
    textEl.value = '';
    statusEl.textContent = '✅ 전송 완료!';
    showStudentReport(studentId);
  } catch(err){
    statusEl.textContent = '❌ 전송에 실패했어요. 잠시 후 다시 시도해주세요.';
  }
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.log('서비스워커 등록 실패:', err);
    });
  });
}
