<body>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">FIND YOUR GREATNESS</div>
    <h1>아임수학학원</h1>
    <div class="sub">학부모·학생 전용 리포트 조회</div>
  </div>

  <div id="loginView">
    <div class="card">
      <form id="loginForm" onsubmit="login(event)">
        <div class="field">
          <label for="login-name">학생 이름</label>
          <input type="text" id="login-name" placeholder="예: 김민준" required>
        </div>
        <div class="field">
          <label for="login-pin">비밀번호(핸드폰끝뒷4자리)</label>
          <input type="password" id="login-pin" maxlength="4" inputmode="numeric" pattern="[0-9]{4}" placeholder="예: 1234" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">확인</button>
        <div class="error-msg" id="loginError"></div>
      </form>
      <div class="login-note">본인(자녀)의 이름과 비밀번호(학원에 등록된 연락처 끝 4자리)를 입력하시면<br>학습 리포트를 확인하실 수 있어요.</div>
    </div>
  </div>

  <div id="reportView" style="display:none;"></div>
</div>

<script>
/* ⚙️ 학원 선생님만: 구글 Apps Script 웹 앱 URL을 여기에 넣어주세요 (관리자 앱의 '데이터 관리'에서 쓰신 것과 동일한 주소예요) */
const SHEET_URL = 'https://script.google.com/macros/s/AKfycby248HXB7pvkzJ1gBjmLux0myAH2otNNt2A4Vp0edu0HAW49W42-8-uJzN_aKnbP6Uf/exec';

let cachedData = null;
let currentData = null;
let siblingList = [];
let currentStudentId = null;

function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function levelOf(grade){
  if(!grade) return '';
  return grade.startsWith('초') ? '초등부' : grade.startsWith('중') ? '중등부' : '';
}

async function fetchData(){
  if(cachedData) return cachedData;
  const res = await fetch(SHEET_URL, { method:'GET' });
  const data = await res.json();
  cachedData = data;
  return data;
}

async function login(e){
  e.preventDefault();
  const name = document.getElementById('login-name').value.trim();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.textContent = '';

  if(!name || !pin){
    errEl.textContent = '이름과 비밀번호를 모두 입력해주세요.';
    return;
  }

  btn.disabled = true;
  btn.textContent = '확인 중...';

  try {
    const data = await fetchData();
    const students = data.students || [];
    const student = students.find(s => s.name === name && s.pin === pin);

    if(!student){
      errEl.textContent = '일치하는 학생을 찾을 수 없어요. 이름과 비밀번호를 다시 확인해주시거나 학원에 문의해주세요.';
      btn.disabled = false;
      btn.textContent = '확인';
      return;
    }

    currentData = data;
    // 가족 연결 코드가 명시적으로 설정된 학생끼리만 형제자매로 묶어요.
    // (예전에는 비밀번호가 같으면 형제자매로 취급했는데, 서로 다른 가족이 우연히
    //  같은 비밀번호를 쓰면 다른 학생 정보가 보이는 문제가 있어서 수정했어요.)
    siblingList = student.familyCode
      ? students.filter(s => s.familyCode && s.familyCode === student.familyCode)
      : [student];
    showStudentReport(student.id);
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('reportView').style.display = 'block';
  } catch(err){
    errEl.textContent = '데이터를 불러오지 못했어요. 인터넷 연결을 확인하시고 잠시 후 다시 시도해주세요.';
    btn.disabled = false;
    btn.textContent = '확인';
  }
}

function showStudentReport(studentId){
  currentStudentId = studentId;
  const student = (currentData.students || []).find(s => s.id === studentId);
  if(!student) return;
  renderReport(currentData, student);
}

function buildScoreChartSVG(tests, groupAvg){
  const w = 560, h = 200, padL = 38, padR = 18, padT = 18, padB = 34;
  const chartW = w - padL - padR, chartH = h - padT - padB;
  const n = tests.length;
  const xAt = i => n <= 1 ? padL + chartW / 2 : padL + (chartW * i / (n - 1));
  const yAt = score => padT + chartH - (score / 100 * chartH);

  const gridLines = [0, 50, 100].map(v => `
    <line x1="${padL}" y1="${yAt(v)}" x2="${w - padR}" y2="${yAt(v)}" stroke="var(--line)" stroke-width="1"/>
    <text x="${padL - 8}" y="${yAt(v) + 4}" font-size="10.5" text-anchor="end" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${v}</text>
  `).join('');

  const pathD = tests.map((t, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(t.score).toFixed(1)}`).join(' ');

  const points = tests.map((t, i) => `
    <circle cx="${xAt(i).toFixed(1)}" cy="${yAt(t.score).toFixed(1)}" r="4" fill="var(--brand)" stroke="#fff" stroke-width="2"/>
    <text x="${xAt(i).toFixed(1)}" y="${(yAt(t.score) - 10).toFixed(1)}" font-size="11" text-anchor="middle" fill="var(--ink)" font-family="'Space Mono',monospace" font-weight="700">${t.score}</text>
    <text x="${xAt(i).toFixed(1)}" y="${h - padB + 16}" font-size="10" text-anchor="middle" fill="var(--ink-soft)" font-family="'Space Mono',monospace">${t.date.slice(5).replace('-', '/')}</text>
  `).join('');

  const groupLineHtml = (groupAvg !== undefined && groupAvg !== null) ? `
    <line x1="${padL}" y1="${yAt(groupAvg).toFixed(1)}" x2="${w - padR}" y2="${yAt(groupAvg).toFixed(1)}" stroke="var(--gold)" stroke-width="1.8" stroke-dasharray="6,4"/>
    <text x="${w - padR}" y="${(yAt(groupAvg) - 6).toFixed(1)}" font-size="10" text-anchor="end" fill="var(--gold)" font-family="'Noto Sans KR',sans-serif" font-weight="700">그룹 평균 ${groupAvg}점</text>
  ` : '';

  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto;">
      ${gridLines}
      ${groupLineHtml}
      <path d="${pathD}" fill="none" stroke="var(--brand)" stroke-width="2.5"/>
      ${points}
    </svg>
  `;
}

function computeGroupAvgScore(studentId, data){
  const students = data.students || [];
  const student = students.find(s => s.id === studentId);
  if(!student) return null;
  const level = levelOf(student.grade);
  const groupTests = (data.dailyTests || []).filter(t => {
    const s = students.find(x => x.id === t.studentId);
    return s && levelOf(s.grade) === level;
  });
  if(groupTests.length === 0) return null;
  return Math.round(groupTests.reduce((sum, t) => sum + t.score, 0) / groupTests.length);
}

function getUnitPerformanceData(studentId, data){
  const dailyTests = data.dailyTests || [];
  const mistakeRecords = data.mistakeRecords || [];
  const MISTAKE_WARNING_THRESHOLD = 3;

  const scoreAgg = {};
  dailyTests.filter(t => t.studentId === studentId).forEach(t => {
    if(!scoreAgg[t.unit]) scoreAgg[t.unit] = { sum: 0, count: 0 };
    scoreAgg[t.unit].sum += t.score;
    scoreAgg[t.unit].count++;
  });
  const avgScoreByUnit = {};
  Object.keys(scoreAgg).forEach(u => { avgScoreByUnit[u] = Math.round(scoreAgg[u].sum / scoreAgg[u].count); });

  const mistakeByUnit = {};
  mistakeRecords.filter(m => m.studentId === studentId).forEach(m => {
    mistakeByUnit[m.unit] = (mistakeByUnit[m.unit] || 0) + 1;
  });

  const allUnits = Array.from(new Set([...Object.keys(avgScoreByUnit), ...Object.keys(mistakeByUnit)]));

  function classify(u){
    const score = avgScoreByUnit[u];
    const mistakes = mistakeByUnit[u] || 0;
    if(score !== undefined && score >= 85 && mistakes < MISTAKE_WARNING_THRESHOLD) return 'strong';
    if((score !== undefined && score < 70) || mistakes >= MISTAKE_WARNING_THRESHOLD) return 'weak';
    return 'neutral';
  }

  return { avgScoreByUnit, mistakeByUnit, allUnits, classify };
}

function renderReport(data, student){
  const wrap = document.getElementById('reportView');
  const BOOKS_MIDDLE = ['개념편','라이트','유형집','기초다지기'];
  const level = levelOf(student.grade);
  let progressRows;
  if(level === '중등부'){
    const bp = student.bookProgress || {};
    progressRows = BOOKS_MIDDLE.map(b => ({ label:b, value: bp[b] || '기록 없음' }));
  } else {
    progressRows = [
      { label:'개념+유형', value: student.concept || '기록 없음' },
      { label:'쎈', value: student.sen || '기록 없음' },
      { label:'최상위S', value: student.topSProgress || '기록 없음' }
    ];
  }

  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth();
  const monthPrefix = `${y}-${String(mo + 1).padStart(2,'0')}`;
  const todayIso = `${y}-${String(mo + 1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const attendanceRecords = (data.attendanceRecords || []).filter(r => r.studentId === student.id);
  const monthRecords = attendanceRecords.filter(r => r.date.startsWith(monthPrefix));
  const attCounts = { 출석:0, 지각:0, 결석:0, 조퇴:0 };
  monthRecords.forEach(r => { attCounts[r.status] = (attCounts[r.status] || 0) + 1; });

  const studentTests = (data.dailyTests || []).filter(t => t.studentId === student.id)
    .slice().sort((a,b) => a.date.localeCompare(b.date) || a.id - b.id);
  const avgScore = studentTests.length ? Math.round(studentTests.reduce((s,t) => s + t.score, 0) / studentTests.length) : null;
  const groupAvgScore = computeGroupAvgScore(student.id, data);

  const perf = getUnitPerformanceData(student.id, data);
  const strongUnits = perf.allUnits.filter(u => perf.classify(u) === 'strong');
  const weakUnits = perf.allUnits.filter(u => perf.classify(u) === 'weak');

  const studentMistakes = (data.mistakeRecords || []).filter(m => m.studentId === student.id);
  const causeCounts = {};
  studentMistakes.forEach(m => { causeCounts[m.cause] = (causeCounts[m.cause] || 0) + 1; });
  const topCauses = Object.entries(causeCounts).sort((a,b) => b[1] - a[1]).slice(0, 5);
  const recentMistakes = studentMistakes.slice().sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id).slice(0, 8);

  const studentHomeworkAssignments = (data.homeworkAssignments || []).filter(a =>
    (a.target && a.target.type === 'class' && a.target.className === student.className) ||
    (a.target && a.target.type === 'individual' && a.target.studentIds && a.target.studentIds.includes(student.id))
  ).slice().sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);

  let nextExamInfo = null;
  const isMiddle = levelOf(student.grade) === '중등부';
  if(isMiddle && student.school){
    const schoolInfos = (data.schoolInfos || []).filter(si => si.school === student.school);
    const upcoming = schoolInfos.filter(si => si.examDate && si.examDate >= todayIso).sort((a,b) => a.examDate.localeCompare(b.examDate));
    nextExamInfo = upcoming[0] || schoolInfos.slice().sort((a,b) => (b.examDate||'').localeCompare(a.examDate||''))[0] || null;
  }

  const parentMessages = (data.parentMessages || []).filter(m => m.studentId === student.id)
    .slice().sort((a,b) => b.date.localeCompare(a.date));

  const teacherComments = data.teacherComments || {};
  const comment = teacherComments[student.id] || teacherComments[String(student.id)] || '';

  const todayStr = `${y}.${String(mo + 1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const todayIsoForInput = `${y}-${String(mo + 1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  const siblingTabsHtml = siblingList.length > 1 ? `
    <div class="sibling-tabs">
      ${siblingList.map(s => `<button type="button" class="sibling-tab ${s.id === student.id ? 'active' : ''}" onclick="showStudentReport(${s.id})">${escapeHtml(s.name)}</button>`).join('')}
    </div>
  ` : '';

  // 알림 배너: 보강 예정(오늘 또는 3일 이내), 다음 학교 시험 임박
  const alerts = [];
  const in3Days = new Date(now);
  in3Days.setDate(in3Days.getDate() + 3);
  const in3DaysIso = `${in3Days.getFullYear()}-${String(in3Days.getMonth()+1).padStart(2,'0')}-${String(in3Days.getDate()).padStart(2,'0')}`;

  attendanceRecords.forEach(r => {
    if(r.status === '결석' && r.makeupDate && !r.makeupDone){
      if(r.makeupDate === todayIso){
        alerts.push({ icon:'📌', text:`오늘(${r.makeupDate.slice(5).replace('-','/')}) 보강이 있어요!`, targetId:'attendanceSection' });
      } else if(r.makeupDate > todayIso && r.makeupDate <= in3DaysIso){
        const mm = r.makeupDate.slice(5).replace('-','/');
        alerts.push({ icon:'🗓️', text:`${mm}에 보강이 예정되어 있어요.`, targetId:'attendanceSection' });
      }
    }
  });

  studentHomeworkAssignments.forEach(a => {
    if(!(a.doneBy || []).includes(student.id)){
      alerts.push({ icon:'✏️', text:`아직 체크 안 한 숙제가 있어요: ${a.text}`, targetId:'hwChecklistSection' });
    }
  });

  const alertBannerHtml = alerts.length ? `
    <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;">
      ${alerts.map(a => `
        <div onclick="document.getElementById('${a.targetId}').scrollIntoView({behavior:'smooth', block:'start'})" style="background:var(--brand); color:#fff; border-radius:10px; padding:12px 14px; font-size:13.5px; font-weight:700; font-family:'Noto Sans KR',sans-serif; display:flex; align-items:center; gap:8px; cursor:pointer;">
          <span style="font-size:16px;">${a.icon}</span>${escapeHtml(a.text)}
          <span style="margin-left:auto; font-size:12px; opacity:0.85;">보러가기 →</span>
        </div>
      `).join('')}
    </div>
  ` : '';

  wrap.innerHTML = `
    ${alertBannerHtml}
    ${siblingTabsHtml}
    <div class="card">
      <div class="report-head">
        <div class="academy">${escapeHtml(data.academyName || '아임수학학원')}</div>
        <h2>${escapeHtml(student.name)} 학생 학습 리포트</h2>
        <div class="meta">${escapeHtml(student.grade)} · ${escapeHtml(student.school) || '학교 정보 없음'} · 조회일 ${todayStr}</div>
      </div>

      <div class="report-section">
        <h4>📘 진도 현황</h4>
        <div class="report-grid">
          ${progressRows.map(r => `<div><span class="label">${r.label}</span>${escapeHtml(r.value)}</div>`).join('')}
        </div>
      </div>

      <div class="report-section" id="attendanceSection">
        <h4>🗓️ 이번 달 출결 현황</h4>
        ${monthRecords.length === 0 ? `<div class="report-empty">이번 달 출결 기록이 아직 없어요.</div>` : `
          <div class="report-grid">
            <div><span class="label">출석</span>${attCounts.출석}일</div>
            <div><span class="label">지각</span>${attCounts.지각}일</div>
            <div><span class="label">결석</span>${attCounts.결석}일</div>
            <div><span class="label">조퇴</span>${attCounts.조퇴}일</div>
          </div>`}
      </div>

      <div class="report-section">
        <h4>✏️ 데일리 테스트${avgScore !== null ? ` · 평균 ${avgScore}점` : ''}${groupAvgScore !== null ? ` · ${escapeHtml(levelOf(student.grade))} 평균 ${groupAvgScore}점` : ''}</h4>
        ${studentTests.length === 0 ? `<div class="report-empty">기록된 데일리 테스트가 없어요.</div>` : buildScoreChartSVG(studentTests, groupAvgScore)}
      </div>

      <div class="report-section" id="hwChecklistSection">
        <h4>✅ 숙제 체크리스트${studentHomeworkAssignments.length ? ` · ${studentHomeworkAssignments.filter(a => (a.doneBy||[]).includes(student.id)).length}/${studentHomeworkAssignments.length} 완료` : ''}</h4>
        <p style="font-size:12.5px; color:var(--ink-soft); margin-bottom:10px; font-family:'Noto Sans KR',sans-serif; font-weight:500;">선생님이 내주신 숙제예요. 다 풀었으면 체크해주세요!</p>
        <div id="hwChecklistArea">
          ${studentHomeworkAssignments.length === 0 ? `<div class="report-empty">지금 배정된 숙제가 없어요.</div>` : studentHomeworkAssignments.map(a => {
            const done = (a.doneBy || []).includes(student.id);
            return `
              <label style="display:flex; align-items:flex-start; gap:10px; padding:11px 12px; margin-bottom:8px; border-radius:9px; background:${done ? 'var(--brand-soft)' : 'var(--cream-alt)'}; cursor:pointer;">
                <input type="checkbox" ${done ? 'checked' : ''} style="margin-top:2px; width:17px; height:17px; accent-color:var(--brand); flex-shrink:0;" onchange="toggleHomeworkCheck(${a.id}, ${student.id}, this.checked)">
                <span style="font-size:13.5px; font-family:'Noto Sans KR',sans-serif; font-weight:600; color:${done ? 'var(--brand-dark)' : 'var(--ink)'}; ${done ? 'text-decoration:line-through; text-decoration-color:var(--brand-dark);' : ''}">
                  ${escapeHtml(a.text)}
                  <span style="display:block; font-size:11px; font-weight:500; color:var(--ink-soft); text-decoration:none; margin-top:2px;">${a.date.replace(/-/g,'.')}</span>
                </span>
              </label>`;
          }).join('')}
        </div>
        <div class="msg-status" id="hwChecklistStatus"></div>
      </div>

      <div class="report-section">
        <h4>💪 강점 단원</h4>
        ${strongUnits.length === 0
          ? `<div class="report-empty">아직 강점으로 뽑을 만큼 데이터가 쌓이지 않았어요.</div>`
          : `<ul class="report-list">${strongUnits.map(u => `<li class="strong-item">${escapeHtml(u)}</li>`).join('')}</ul>`}
      </div>

      <div class="report-section">
        <h4>🌱 보완하면 좋은 부분</h4>
        ${weakUnits.length === 0
          ? `<div class="report-empty">지금까지는 특별히 보완이 필요한 단원이 없어요.</div>`
          : `<ul class="report-list">${weakUnits.map(u => `<li class="grow-item">${escapeHtml(u)} · 조금 더 연습하면 훨씬 좋아질 부분이에요</li>`).join('')}</ul>`}
      </div>

      <div class="report-section">
        <h4>🔎 자주 보이는 실수 유형</h4>
        ${topCauses.length === 0
          ? `<div class="report-empty">기록된 오답 원인이 없어요.</div>`
          : `<ul class="report-list">${topCauses.map(([cause, cnt]) => `<li>${escapeHtml(cause)} <span style="color:var(--ink-soft); font-size:12px;">· ${cnt}회</span></li>`).join('')}</ul>`}
      </div>

      <div class="report-section">
        <h4>📝 최근 오답 상세</h4>
        ${recentMistakes.length === 0
          ? `<div class="report-empty">기록된 오답이 없어요.</div>`
          : `<ul class="report-list">${recentMistakes.map(m => `<li>${m.date.replace(/-/g,'.')} · ${escapeHtml(m.unit)} · ${escapeHtml(m.cause)}${m.note ? ` <span style="color:var(--ink-soft); font-size:12px;">(${escapeHtml(m.note)})</span>` : ''}</li>`).join('')}</ul>`}
      </div>

      ${isMiddle ? `
      <div class="report-section">
        <h4>🏫 다음 학교 시험 일정</h4>
        ${!nextExamInfo
          ? `<div class="report-empty">등록된 학교 시험 정보가 없어요.</div>`
          : `<div class="report-grid">
              <div><span class="label">시험명</span>${escapeHtml(nextExamInfo.examName || '-')}</div>
              <div><span class="label">시험일</span>${nextExamInfo.examDate ? nextExamInfo.examDate.replace(/-/g,'.') : '-'}</div>
              <div style="grid-column:1/-1;"><span class="label">시험범위</span>${escapeHtml(nextExamInfo.examRange || '-')}</div>
              ${nextExamInfo.note ? `<div style="grid-column:1/-1;"><span class="label">특이사항</span>${escapeHtml(nextExamInfo.note)}</div>` : ''}
            </div>`}
      </div>` : ''}

      <div class="report-section" style="margin-bottom:0;">
        <h4>💬 선생님 한마디</h4>
        <div class="comment-box">${comment ? escapeHtml(comment) : '아직 남겨주신 코멘트가 없어요.'}</div>
      </div>
    </div>

    <div class="card">
      <h4 style="font-size:14px; color:var(--brand-dark); margin-bottom:10px;">💌 선생님께 메시지 남기기</h4>
      ${parentMessages.length > 0 ? `
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:14px;">
          ${parentMessages.map(m => `
            <div class="msg-history-item">
              <span class="msg-history-date">${new Date(m.date).toLocaleString('ko-KR')}</span>
              ${escapeHtml(m.message)}
            </div>`).join('')}
        </div>` : ''}
      <textarea id="parentMsgInput" class="msg-textarea" placeholder="선생님께 궁금한 점이나 전하고 싶은 말을 남겨주세요."></textarea>
      <button type="button" class="btn" style="margin-top:10px;" onclick="submitParentMessage(${student.id})">메시지 보내기</button>
      <div class="msg-status" id="parentMsgStatus"></div>
    </div>

    <button type="button" class="btn ghost" onclick="location.reload()">🔒 로그아웃 (다른 학생 조회)</button>
  `;
}

async function toggleHomeworkCheck(assignmentId, studentId, checked){
  const statusEl = document.getElementById('hwChecklistStatus');
  if(statusEl) statusEl.textContent = '저장 중...';

  try {
    const freshRes = await fetch(SHEET_URL, { method:'GET' });
    const freshData = await freshRes.json();

    freshData.homeworkAssignments = freshData.homeworkAssignments || [];
    const a = freshData.homeworkAssignments.find(x => x.id === assignmentId);
    if(a){
      a.doneBy = a.doneBy || [];
      const idx = a.doneBy.indexOf(studentId);
      if(checked && idx === -1) a.doneBy.push(studentId);
      if(!checked && idx !== -1) a.doneBy.splice(idx, 1);
    }

    await fetch(SHEET_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain' },
      body: JSON.stringify(freshData)
    });

    cachedData = freshData;
    currentData = freshData;
    showStudentReport(studentId);
  } catch(err){
    if(statusEl) statusEl.textContent = '❌ 저장에 실패했어요. 잠시 후 다시 시도해주세요.';
  }
}


async function submitParentMessage(studentId){
  const textEl = document.getElementById('parentMsgInput');
  const statusEl = document.getElementById('parentMsgStatus');
  const text = textEl.value.trim();

  if(!text){
    statusEl.textContent = '메시지를 입력해주세요.';
    return;
  }

  statusEl.textContent = '전송 중...';

  try {
    const freshRes = await fetch(SHEET_URL, { method:'GET' });
    const freshData = await freshRes.json();
    const student = (freshData.students || []).find(s => s.id === studentId);

    freshData.parentMessages = freshData.parentMessages || [];
    const nextId = freshData.parentMessages.length ? Math.max(...freshData.parentMessages.map(m => m.id || 0)) + 1 : 1;
    freshData.parentMessages.push({
      id: nextId,
      studentId: studentId,
      studentName: student ? student.name : '',
      date: new Date().toISOString(),
      message: text
    });

    await fetch(SHEET_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain' },
      body: JSON.stringify(freshData)
    });

    cachedData = freshData;
    currentData = freshData;
    statusEl.textContent = '✅ 선생님께 전달했어요!';
    showStudentReport(studentId);
  } catch(err){
    statusEl.textContent = '❌ 전송에 실패했어요. 잠시 후 다시 시도해주세요.';
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => {
      console.log('서비스워커 등록 실패:', err);
    });
  });
}
